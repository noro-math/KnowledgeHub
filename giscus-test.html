    <!-- Giscus Comments -->

        data-repo="noro-math/KnowledgeHub"

        data-category="General"
        data-category-id="DIC_kwDOQ_Zwd84C1Tsd"

        setTimeout(() => {
            console.log('Checking Giscus elements...');

            const giscusFrame = document.querySelector('iframe.giscus-frame');

            console.log('Giscus script:', giscusScript);
