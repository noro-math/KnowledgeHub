<!DOCTYPE html>
<html>
<head>
    <title>Giscus Debug Tool</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
        .info { color: blue; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Giscus Configuration Debug Tool</h1>
    
    <div class="test-section">
        <h2>Repository Check</h2>
        <p>Testing repository: <strong>noro-math/KnowledgeHub</strong></p>
        <div id="repo-status">Checking...</div>
    </div>
    
    <div class="test-section">
        <h2>Giscus Configuration Test</h2>
        <p>This will test your exact configuration:</p>
        <div id="giscus-container"></div>
    </div>
    
    <div class="test-section">
        <h2>Debug Information</h2>
        <div id="debug-info">Loading...</div>
    </div>
    
    <div class="test-section">
        <h2>Working Demo (for comparison)</h2>
        <p>This uses the known working giscus/giscus repository:</p>
        <div id="demo-container"></div>
    </div>

    <script>
        // Test your repository
        async function testRepository() {
            const repoStatus = document.getElementById('repo-status');
            
            try {
                // Test if repository exists and is public
                const response = await fetch('https://api.github.com/repos/noro-math/KnowledgeHub');
                const data = await response.json();
                
                if (response.ok) {
                    repoStatus.innerHTML = `
                        <div class="success">✅ Repository found and is public</div>
                        <div class="info">Repository ID: ${data.id}</div>
                        <div class="info">Has Discussions: ${data.has_discussions ? '✅ Yes' : '❌ No'}</div>
                        <div class="info">Default Branch: ${data.default_branch}</div>
                    `;
                    
                    if (!data.has_discussions) {
                        repoStatus.innerHTML += '<div class="error">❌ Discussions are not enabled! Go to Settings → Features → Enable Discussions</div>';
                    }
                } else {
                    repoStatus.innerHTML = `<div class="error">❌ Repository not found or not public: ${data.message}</div>`;
                }
            } catch (error) {
                repoStatus.innerHTML = `<div class="error">❌ Error checking repository: ${error.message}</div>`;
            }
        }
        
        // Load your Giscus configuration
        function loadYourGiscus() {
            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', 'noro-math/KnowledgeHub');
            script.setAttribute('data-repo-id', 'R_kgDOQ_Zwdw');
            script.setAttribute('data-category', 'General');
            script.setAttribute('data-category-id', 'DIC_kwDOQ_Zwd84C1Tsd');
            script.setAttribute('data-mapping', 'pathname');
            script.setAttribute('data-strict', '0');
            script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0');
            script.setAttribute('data-input-position', 'bottom');
            script.setAttribute('data-theme', 'light');
            script.setAttribute('data-lang', 'en');
            script.setAttribute('crossorigin', 'anonymous');
            script.async = true;
            
            document.getElementById('giscus-container').appendChild(script);
        }
        
        // Load working demo
        function loadDemoGiscus() {
            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', 'giscus/giscus');
            script.setAttribute('data-repo-id', 'MDEwOlJlcG9zaXRvcnkzNzM2NDM1OTg=');
            script.setAttribute('data-category', 'General');
            script.setAttribute('data-category-id', 'DIC_kwDOFjQgPs4CA_2S');
            script.setAttribute('data-mapping', 'pathname');
            script.setAttribute('data-strict', '0');
            script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0');
            script.setAttribute('data-input-position', 'bottom');
            script.setAttribute('data-theme', 'light');
            script.setAttribute('data-lang', 'en');
            script.setAttribute('crossorigin', 'anonymous');
            script.async = true;
            
            document.getElementById('demo-container').appendChild(script);
        }
        
        // Debug information
        function showDebugInfo() {
            const debugInfo = document.getElementById('debug-info');
            
            setTimeout(() => {
                const giscusScripts = document.querySelectorAll('script[src*="giscus.app"]');
                const giscusFrames = document.querySelectorAll('iframe.giscus-frame');
                const giscusContainers = document.querySelectorAll('.giscus');
                
                debugInfo.innerHTML = `
                    <pre>
Debug Information:
==================
Giscus scripts loaded: ${giscusScripts.length}
Giscus iframes found: ${giscusFrames.length}
Giscus containers: ${giscusContainers.length}

Current URL: ${window.location.href}
User Agent: ${navigator.userAgent}

Console errors (check browser console for details):
- Look for any red error messages
- Check Network tab for failed requests
- Look for CORS or authentication errors

Common Issues:
1. Repository not public
2. Discussions not enabled
3. Giscus app not installed
4. Wrong repo-id or category-id
5. Repository name typo
                    </pre>
                `;
                
                // Check for errors in console
                const originalConsoleError = console.error;
                const errors = [];
                console.error = function(...args) {
                    errors.push(args.join(' '));
                    originalConsoleError.apply(console, args);
                };
                
                setTimeout(() => {
                    if (errors.length > 0) {
                        debugInfo.innerHTML += `<div class="error">Console Errors Found:<br>${errors.join('<br>')}</div>`;
                    }
                }, 2000);
                
            }, 3000);
        }
        
        // Run tests
        testRepository();
        loadYourGiscus();
        loadDemoGiscus();
        showDebugInfo();
        
        // Additional debugging
        window.addEventListener('message', function(event) {
            if (event.origin === 'https://giscus.app') {
                console.log('Giscus message:', event.data);
            }
        });
    </script>
</body>
</html>
