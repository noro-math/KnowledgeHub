project:
  type: website
  output-dir: docs

website:
  title: "Knowledge Hub"
  description: "A comprehensive knowledge repository covering various subjects"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: mathematics/index.qmd
        text: Mathematics
      - href: demo-comments.qmd
        text: Comments Demo
    right:
      - text: "<i class='bi bi-sun-fill theme-icon-active' id='theme-toggle'></i>"
        href: "#"
        aria-label: "Toggle dark mode"
      - icon: github
        href: https://github.com/yourusername/knowledge-hub
        aria-label: GitHub
  sidebar:
    - title: "Mathematics"
      contents:
        - mathematics/index.qmd
        - section: "Linear Algebra"
          contents:
            - mathematics/linear-algebra/index.qmd
            - mathematics/linear-algebra/notes.qmd
            - mathematics/linear-algebra/exercises.qmd
            - section: "Interactive Notebooks"
              contents:
                - mathematics/linear-algebra/notebooks/01-vector-spaces.ipynb
                - mathematics/linear-algebra/notebooks/02-linear-transformations.ipynb
                - mathematics/linear-algebra/notebooks/03-eigenvalues-eigenvectors.ipynb

format:
  html:
    theme: 
      light: flatly
      dark: slate
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    include-after-body: theme-toggle.html
    comments:
      giscus:
        repo: noro-math/KnowledgeHub
        repo-id: "R_kgDOQ_Zwdw"
        category: "General"
        category-id: "DIC_kwDOQ_Zwd84C1Tsd"
        mapping: "pathname"
        reactions-enabled: true
        input-position: "bottom"
        theme: "preferred_color_scheme"
        language: "en"
        loading: "lazy"

jupyter: python3